<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Nokia</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="Nokia home">
          <img src="img/nokia-logo.svg" alt="Nokia" />
        </a>

        <nav class="nav" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="products.html">Products</a>
          <a href="contact.html" aria-current="page">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section" aria-labelledby="contact-section-title">
        <div class="container">
          <div class="section-header">
            <h1 id="contact-section-title">Contact us</h1>
          </div>

          <div class="contact-grid">
            <article class="panel contact-text-block">
              <div class="panel-inner">
                <h2>Visit us at:</h2>
                <p class="address">
                  Nokia<br />
                  Karaportti 2<br />
                  02340 ESPOO<br />
                  Finland
                </p>

                <div class="contact-lines" aria-label="Contact methods">
                  <a href="mailto:info@metropolia.fi">Email: info@metropolia.fi</a>
                  <a href="tel:+358401231233">Phone: +358 (0)401231233</a>
                </div>
              </div>
            </article>

            <article class="panel">
              <img
                src="img/karamalmi.png"
                alt="Map placeholder showing the area around Karamalmi, Espoo, Finland"
              />
            </article>
          </div>
        </div>
      </section>
    </main>

  </body>
</html>
